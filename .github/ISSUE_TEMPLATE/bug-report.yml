name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Clear reproduction steps help us fix issues faster.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues for the same problem.
          required: true
        - label: I can reproduce this on the latest available version, or I noted the version below.
          required: true
  - type: input
    id: version
    attributes:
      label: QingYu version
      description: Use the version from the app or release asset, if available.
      placeholder: "0.1.18"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "macOS 15.5 / Windows 11 / Ubuntu 24.04"
  - type: textarea
    id: current-behavior
    attributes:
      label: What happened?
      description: Describe the current behavior and any visible errors.
      placeholder: "When I..., QingYu..."
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: What did you expect?
      placeholder: "I expected..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. Type...
        4. See...
    validations:
      required: true
  - type: textarea
    id: attachments
    attributes:
      label: Screenshots, logs, or sample files
      description: Add anything that helps explain the issue. Remove private content before attaching files.
